<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Habesha Connect V7.0.0 English Amharic Edition</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#162033;--muted:#6b7280;--primary:#0f766e;--dark:#0b1220;--line:#e5e7eb;--warn:#b45309;--good:#15803d;--bad:#b91c1c}*{box-sizing:border-box}html,body{min-height:100%;overflow-y:auto!important}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);pointer-events:auto!important}header{background:linear-gradient(135deg,#0f766e,#111827);color:white;padding:18px 24px;position:sticky;top:0;z-index:2}header .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{font-size:24px;font-weight:800}.tag{font-size:13px;opacity:.9}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.nav button,.btn{border:0;border-radius:10px;padding:10px 13px;background:#fff;color:#111827;font-weight:700;cursor:pointer}.nav button.active{background:#fde68a}.btn.primary{background:var(--primary);color:#fff}.btn.dark{background:#111827;color:#fff}.btn.warn{background:#d97706;color:#fff}.btn.bad{background:#dc2626;color:#fff}.btn.ghost{background:#eef2ff;color:#3730a3}.container{max-width:1180px;margin:0 auto;padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 22px rgba(15,23,42,.06)}.hero{background:linear-gradient(135deg,#ecfeff,#fff7ed);border-radius:20px;padding:26px;border:1px solid var(--line)}h1,h2,h3{margin-top:0}.muted{color:var(--muted);font-size:14px}.stat{font-size:28px;font-weight:800;color:var(--primary)}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;margin:6px 0 12px;background:white}label{font-weight:700;font-size:13px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.hide{display:none!important}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#e0f2fe;color:#075985;font-size:12px;font-weight:700}.pill.good{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.bad{background:#fee2e2;color:#991b1b}.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}td,th{padding:11px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#f8fafc}.footer{text-align:center;color:#6b7280;padding:30px}.service-icon{font-size:34px}.locked{opacity:.65}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;margin:12px 0}.photoStrip{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.photoThumb{padding:8px 10px;background:#f1f5f9;border:1px solid var(--line);border-radius:10px;font-size:12px}.small{font-size:12px;color:var(--muted)}.mobilebar{display:none}.page{min-height:calc(100vh - 120px);overflow:visible!important;touch-action:pan-y}.tableWrap{width:100%;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;border-radius:14px}#admin{overflow:visible!important;touch-action:pan-y;-webkit-overflow-scrolling:touch}html,body{height:auto!important;touch-action:pan-y;-webkit-overflow-scrolling:touch}@media(max-width:720px){.row{grid-template-columns:1fr}.container{padding:14px}.nav{display:none}.mobilebar{display:block;margin-top:12px}.mobilebar select{margin:0}.brand{font-size:20px}}
</style>
</head>
<body>
<header>
  <div class="top"><div><div class="brand">Habesha Connect</div><div class="tag">Community • Shipping • Rentals • Marketplace • Jobs • Trucking • Business</div></div><div id="userBox"></div></div>
  <div class="nav" id="nav"></div>
  <div class="mobilebar"><select id="mobileNav" onchange="show(this.value)"></select></div>
</header>
<main class="container">
  <section id="home" class="page"></section>
  <section id="account" class="page hide"></section>
  <section id="profile" class="page hide"></section>
  <section id="services" class="page hide"></section>
  <section id="shipping" class="page hide"></section>
  <section id="rentals" class="page hide"></section>
  <section id="marketplace" class="page hide"></section>
  <section id="jobs" class="page hide"></section>
  <section id="truck" class="page hide"></section>
  <section id="business" class="page hide"></section>
  <section id="messages" class="page hide"></section>
  <section id="notifications" class="page hide"></section>
  <section id="admin" class="page hide"></section>
</main>
<div class="footer">Habesha Connect V7.0.0 — English / አማርኛ Edition.</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>

const $=id=>document.getElementById(id);
const pages=['home','account','profile','services','shipping','rentals','marketplace','jobs','truck','business','messages','notifications','admin'];
const labels={home:'Home',account:'Account',profile:'Profile',services:'My Services',shipping:'Shipping',rentals:'Rentals',marketplace:'Marketplace',jobs:'Jobs',truck:'Trucking',business:'Business Manager',messages:'Messages',notifications:'Notifications',admin:'Admin'};
const hcSupabase=(window.supabase&&window.SUPABASE_URL&&window.SUPABASE_ANON_KEY)?window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY):null;
function authReady(){return !!hcSupabase}
function cleanEmail(v){return String(v||'').trim().toLowerCase();}
function showAuthStatus(){let el=$("authStatus"); if(el) el.textContent=authReady()?"Supabase connected":"Not connected";}
function togglePassword(id,btn){let input=$(id);if(!input)return;input.type=input.type==='password'?'text':'password';if(btn)btn.textContent=input.type==='password'?'👁️':'🙈';}
function passwordField(id,placeholder,auto){return `<div style="display:flex;gap:8px;align-items:center"><input id="${id}" type="password" placeholder="${placeholder||''}" autocomplete="${auto||'current-password'}" style="flex:1"><button type="button" class="btn ghost" onclick="togglePassword('${id}',this)" title="Show password">👁️</button></div>`;}
const ROLE_INFO={traveler:{icon:'✈️',title:'Traveler',desc:'Post trips and accept sender package requests.'},sender:{icon:'📦',title:'Sender',desc:'Find travelers and request package space.'},owner:{icon:'🏠',title:'Property Owner',desc:'Post and manage rental properties.'},rent_seeker:{icon:'🔍',title:'Rent Seeker',desc:'Search rentals and request viewings.'},driver:{icon:'🚚',title:'Truck Driver',desc:'Manage trucking jobs and deliveries.'},business_owner:{icon:'🏢',title:'Business Owner',desc:'Manage business listings and tools.'},customer:{icon:'🧭',title:'Customer',desc:'Browse marketplace, jobs, messages, and notifications.'},admin:{icon:'⚙️',title:'Admin',desc:'Manage the full platform.'}};
const ROLE_LIST=['traveler','sender','owner','rent_seeker','driver','business_owner','customer'];
function serviceRoleChoices(currentRoles){let list=[...ROLE_LIST]; if((currentRoles||[]).includes('admin')&&!list.includes('admin'))list.push('admin'); return list;}
function persistOnly(){data.currentUser=currentUser;localStorage.setItem('hc_v35',JSON.stringify(data));}
function normalizeRoles(profile){let roles=Array.isArray(profile?.roles)?profile.roles.filter(Boolean):[];let base=profile?.role||profile?.active_role||'customer';if(base&&!roles.includes(base))roles.unshift(base);roles=[...new Set(roles.length?roles:['customer'])];return roles}
function roleTitle(role){return (ROLE_INFO[role]&&ROLE_INFO[role].title)||role}
function upsertLocalUser(profile){if(!profile||!profile.email)return null;let u=data.users.find(x=>x.email===profile.email);let roles=normalizeRoles(profile);let savedRole=localStorage.getItem('hc_active_role_'+profile.email);let activeRole=(savedRole&&roles.includes(savedRole))?savedRole:(profile.active_role&&roles.includes(profile.active_role)?profile.active_role:(profile.role&&roles.includes(profile.role)?profile.role:roles[0]));let cleaned={id:profile.id||profile.profile_id||'',auth_user_id:profile.auth_user_id||'',name:profile.name||profile.full_name||profile.email,phone:profile.phone||'',email:profile.email,role:activeRole,active_role:activeRole,roles,verified:!!profile.verified,city:profile.city||''};if(u)Object.assign(u,cleaned);else data.users.push(cleaned);return data.users.find(x=>x.email===profile.email)}
async function loadSupabaseProfile(user){if(!authReady()||!user)return null;let {data:profile,error}=await hcSupabase.from('profiles').select('*').eq('auth_user_id',user.id).maybeSingle();if(error)console.warn('Profile load error',error);if(!profile){profile={auth_user_id:user.id,name:user.user_metadata?.name||user.email,phone:user.user_metadata?.phone||'',email:user.email,role:user.user_metadata?.role||'customer',roles:user.user_metadata?.roles||[user.user_metadata?.role||'customer'],active_role:user.user_metadata?.active_role||user.user_metadata?.role||'customer',verified:false};let res=await hcSupabase.from('profiles').upsert(profile,{onConflict:'email'}).select().single();profile=res.data||profile;}return upsertLocalUser(profile)}
async function initAuth(){if(!authReady()){console.warn('Supabase config not loaded. Using local prototype login.');return;}let {data:sessionData}=await hcSupabase.auth.getSession();if(sessionData&&sessionData.session&&sessionData.session.user){let u=await loadSupabaseProfile(sessionData.session.user);if(u){currentUser=u;data.currentUser=currentUser;localStorage.setItem('hc_v35',JSON.stringify(data));render();}}}

const PROPERTY_TYPES=['Home','Apartment','Basement','Roommate','Town House','Business'];
const DEFAULT_SETTINGS={ownerListingFee:25,seekerViewingFee:10,shippingRatePerLb:9,appCommissionPerLb:2,travelerCommissionPerLb:2,travelerTripListingFee:10,airlineChargeMin:200,airlineChargeMax:300,registrationOpen:true,maintenanceMode:false};
function settings(){data.settings=Object.assign({},DEFAULT_SETTINGS,data.settings||{});return data.settings}
function setMoneySetting(key,val){let v=Number(val);if(!isNaN(v)&&v>=0){settings()[key]=v;save()}}
const US_CITIES=['Atlanta, GA','Washington, DC','New York, NY','Chicago, IL','Dallas, TX','Houston, TX','Los Angeles, CA','Seattle, WA','Boston, MA','Miami, FL','Minneapolis, MN','Denver, CO','Philadelphia, PA','San Francisco, CA'];
const ETHIOPIA_CITIES=['Addis Ababa','Adama (Nazret)','Bahir Dar','Gondar','Hawassa','Dire Dawa','Mekelle','Jimma','Dessie','Bishoftu (Debre Zeit)','Harar','Arba Minch','Shashemene'];
function options(arr,selected=''){return arr.map(x=>`<option ${x===selected?'selected':''}>${x}</option>`).join('')}
function routeSelects(prefix='ship'){return `<div class="grid two"><div><label>From (U.S. City)</label><select id="${prefix}From">${options(US_CITIES,'Atlanta, GA')}</select></div><div><label>To (Ethiopia City)</label><select id="${prefix}To">${options(ETHIOPIA_CITIES,'Addis Ababa')}</select></div></div><p class="muted">Use the arrows to choose the main U.S. city and Ethiopia destination city.</p>`}

let data=JSON.parse(localStorage.getItem('hc_v35')||'null')||seed();
function removeOldDemoData(){
  // Remove old demo traveler trip that may already be saved in this browser's localStorage.
  data.trips=(data.trips||[]).filter(t=>!(t.id==='T1001'||t.traveler==='Demo Traveler'||t.travelerPhone==='404-222-3333'));
  data.shipments=(data.shipments||[]).filter(s=>!(s.tripId==='T1001'||s.traveler==='Demo Traveler'||s.travelerPhone==='404-222-3333'));
  data.payments=(data.payments||[]).filter(p=>!String(p.desc||'').includes('T1001')&&!String(p.desc||'').includes('Demo Traveler'));
  data.notifications=(data.notifications||[]).filter(n=>!String(n.text||n.message||'').includes('Demo Traveler')&&!String(n.text||n.message||'').includes('T1001'));
}
removeOldDemoData();
let currentUser=data.currentUser||null;
function seed(){return {currentUser:null,users:[{name:'Admin',email:'admin@habeshaconnect.com',phone:'404-000-0000',pass:'admin123',role:'admin',verified:true}],notifications:[],payments:[],messages:[],favorites:[],reviews:[],shipments:[],trips:[],rentals:[],rentalRequests:[],market:[],jobs:[],trucks:[],businesses:[],settings:Object.assign({},DEFAULT_SETTINGS)}}
function save(){data.currentUser=currentUser;localStorage.setItem('hc_v35',JSON.stringify(data));render()}
function money(n){return '$'+Number(n||0).toLocaleString()}
function ensureArrays(){if(!data.rentalRequests)data.rentalRequests=[];if(!data.rentals)data.rentals=[];if(!data.shipments)data.shipments=[];if(!data.trips)data.trips=[];if(!data.favorites)data.favorites=[];if(!data.reviews)data.reviews=[];data.users.forEach(u=>{if(u.verified===undefined)u.verified=false});data.trips.forEach(t=>{t.totalSpace=+t.totalSpace||0;t.availableSpace=(t.availableSpace===undefined?+t.totalSpace:+t.availableSpace)||0;t.travelerPhone=t.travelerPhone||'';t.travelerEmail=t.travelerEmail||'';t.travelerVerified=!!(data.users.find(u=>u.email===t.travelerEmail)?.verified||t.travelerVerified);t.status=t.status||'Open';t.listingFeePaid=!!t.listingFeePaid;t.listingFeeAmount=Number(t.listingFeeAmount||settings().travelerTripListingFee||10);t.listingFeeRefunded=!!t.listingFeeRefunded;});data.shipments.forEach(s=>{s.senderPhone=s.senderPhone||'';s.travelerPhone=s.travelerPhone||'';s.receiver=s.receiver||'Receiver not entered';s.receiverPhone=s.receiverPhone||'';s.tracking=s.tracking||('HC-'+s.id);s.packagePhotos=s.packagePhotos||[];s.senderVerified=!!(data.users.find(u=>u.email===s.senderEmail)?.verified||s.senderVerified);s.travelerVerified=!!(data.users.find(u=>u.email===s.travelerEmail)?.verified||s.travelerVerified);if(s.paid===undefined)s.paid=(s.status==='Paid'||s.status==='Payment Pending Admin Review'||s.status==='Approved'||s.paymentStatus==='Paid');s.travelerListingFeeRefund=Number(s.travelerListingFeeRefund||0);s.travelerPayoutAmount=Number(s.travelerPayoutAmount||0);});data.rentals.forEach(r=>{r.ownerPhone=r.ownerPhone||'';r.ownerEmail=r.ownerEmail||'';r.owner=r.owner||'Owner';r.status=r.status||'Pending';r.propertyType=r.propertyType||'Home';r.appFee=r.appFee||settings().seekerViewingFee;r.ownerFee=r.ownerFee||settings().ownerListingFee;if(r.ownerPaid===undefined)r.ownerPaid=(r.status==='Approved'||r.status==='Available');r.photos=r.photos||[];r.deposit=r.deposit||0;r.moveDate=r.moveDate||'';r.leaseTerm=r.leaseTerm||'';r.pets=r.pets||'No';r.parking=r.parking||'No';r.furnished=r.furnished||'No';r.utilities=r.utilities||'Not included';r.ownerRating=avgOwnerRating(r.ownerEmail)});}
function verifiedBadge(ok){return ok?'<span class="pill good">Verified</span>':'<span class="pill warn">Not Verified</span>'}
function avgOwnerRating(email){let rev=(data.reviews||[]).filter(x=>x.type==='owner'&&x.target===email);return rev.length?(rev.reduce((a,b)=>a+(+b.rating||0),0)/rev.length).toFixed(1):''}
function photoNamesFromInput(id){let el=$(id);return el&&el.files?[...el.files].map(f=>f.name):[]}
function contactLine(label,name,phone,email){return `<p><b>${label}:</b> ${name||'Not assigned'} ${phone?` • ${phone}`:''} ${email?` • ${email}`:''}</p>`}
ensureArrays();
const ROLE_PAGES={
 guest:['home','account','shipping','rentals','marketplace','jobs','truck','business'],
 traveler:['home','services','profile','shipping','messages','notifications'],
 sender:['home','services','profile','shipping','messages','notifications'],
 owner:['home','services','profile','rentals','messages','notifications'],
 rent_seeker:['home','services','profile','rentals','messages','notifications'],
 admin:['home','services','profile','shipping','rentals','marketplace','jobs','truck','business','messages','notifications','admin'],
 customer:['home','services','profile','marketplace','jobs','messages','notifications'],
 driver:['home','services','profile','truck','messages','notifications'],
 business_owner:['home','services','profile','business','marketplace','jobs','messages','notifications']
};
function rolePages(){return currentUser?(ROLE_PAGES[currentUser.role]||ROLE_PAGES.customer):ROLE_PAGES.guest}
function isAllowedPage(p){return rolePages().includes(p)}
function visiblePages(){return pages.filter(p=>isAllowedPage(p))}
function nav(){let visible=visiblePages();let n=visible.map(p=>`<button onclick="show('${p}')" id="nav_${p}">${labels[p]}</button>`).join('');$('nav').innerHTML=n;$('mobileNav').innerHTML=visible.map(p=>`<option value="${p}">${labels[p]}</option>`).join('')}
let currentPage='home';
let renderingPage=false;
let adminLoading=false;
let adminDataLoaded=false;
async function show(p){
 if(!isAllowedPage(p)){p=currentUser?'services':'account'}
 // Prevent repeated Admin renders from making the page jump or vibrate.
 if(renderingPage && p===currentPage)return;
 if(p==='admin' && adminLoading)return;
 if(p==='admin' && currentPage==='admin' && !$('admin')?.innerHTML.includes('Loading latest data')){
   document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
   let nb=$('nav_admin');if(nb)nb.classList.add('active');
   if($('mobileNav'))$('mobileNav').value='admin';
   return;
 }
 renderingPage=true;
 const oldScroll=window.scrollY||document.documentElement.scrollTop||0;
 pages.forEach(x=>$(x).classList.add('hide'));
 $(p).classList.remove('hide');
 document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
 let nb=$('nav_'+p);if(nb)nb.classList.add('active');
 if($('mobileNav'))$('mobileNav').value=p;
 if(['shipping','rentals','profile','marketplace','jobs','truck','business'].includes(p)){
   $(p).innerHTML='<div class="card"><b>Loading latest data...</b><p class="muted">Refreshing from Supabase.</p></div>';
 }
 if(p==='admin' && currentPage!=='admin'){
   $('admin').innerHTML='<div class="card"><b>Loading Admin Dashboard...</b><p class="muted">Please wait.</p></div>';
 }
 currentPage=p;
 await renderPage(p);
 renderingPage=false;
 if(p==='admin')setTimeout(()=>window.scrollTo(0,oldScroll),0);
}
async function refreshPageData(p){
 if(!authReady())return;
 if(p==='profile'||p==='shipping'||p==='admin'){
   await loadSupabaseTrips();
   await loadSupabaseShipments();
   recalcTripSpacesFromShipments();
 }
 if(p==='profile'||p==='rentals'||p==='admin'){
   await loadSupabaseRentals();
 }
 if(p==='admin' && !adminDataLoaded){
   await loadAdminProfiles();
 }
}
function roleSwitcherHtml(){if(!currentUser)return '';let roles=currentUser.roles||[currentUser.role||'customer'];let opts=roles.map(r=>`<option value="${r}" ${r===currentUser.role?'selected':''}>${(ROLE_INFO[r]?.icon||'')+' '+roleTitle(r)}</option>`).join('');return `<select id="topRoleSwitch" onchange="switchRole(this.value)" style="width:auto;min-width:150px;margin:0 6px;padding:9px;border-radius:10px;font-weight:700">${opts}</select>`}
function render(){nav();$('userBox').innerHTML=currentUser?`Signed in: <b>${currentUser.name}</b> <span class="pill">${roleTitle(currentUser.role)}</span> ${roleSwitcherHtml()} <button class="btn ghost" onclick="show('services')">My Services</button> <button class="btn" onclick="logout()">Logout</button>`:`<button class="btn" onclick="show('account')">Login / Register</button>`;let active=pages.find(p=>!$(p).classList.contains('hide'))||'home';if(!isAllowedPage(active))active='home';renderPage(active)}
function requireLogin(){if(!currentUser){show('account');return false}return true}
async function login(){let e=cleanEmail($('loginEmail')?.value),p=String($('loginPass')?.value||'');if(!e||!p)return alert('Enter your email and password.');if(!e.includes('@'))return alert('Please enter the full email address you used to create the account.');if(authReady()){let {data:authData,error}=await hcSupabase.auth.signInWithPassword({email:e,password:p});if(error){let localAdmin=data.users.find(x=>cleanEmail(x.email)===e&&x.pass===p&&x.role==='admin');if(localAdmin){currentUser=localAdmin;addNote(localAdmin.email,'You signed in with local admin access.');save();show('admin');return;}let msg=String(error.message||'');if(msg.toLowerCase().includes('invalid'))msg='Login failed. Please check the email and password. Make sure there are no spaces and use the same email used during signup.';return alert(msg);}let u=await loadSupabaseProfile(authData.user);if(!u)return alert('Login worked, but profile was not found.');currentUser=u;addNote(u.email,'You signed in successfully.');save();show('services');return;}let u=data.users.find(x=>cleanEmail(x.email)===e&&x.pass===p);if(!u)return alert('Wrong email or password');currentUser=u;addNote(u.email,'You signed in successfully.');save();show('services')}
async function register(){let name=$('regName').value.trim(),phone=$('regPhone').value.trim(),email=cleanEmail($('regEmail')?.value),pass=$('regPass').value;let selected=[...document.querySelectorAll('.roleCheck:checked')].map(x=>x.value);if(!selected.length)selected=['customer'];let role=selected[0];if(!name||!phone||!email||!pass)return alert('Please complete all fields including phone number');if($('agreeTerms')&&!$('agreeTerms').checked)return alert('Please agree to the Terms and Privacy Policy.');if(!settings().registrationOpen&&(!currentUser||currentUser.role!=='admin'))return alert('Registration is currently closed.');if(authReady()){let {data:authData,error}=await hcSupabase.auth.signUp({email,password:pass,options:{data:{name,phone,role,roles:selected,active_role:role}}});if(error)return alert(error.message);let authUser=authData.user;let profile={auth_user_id:authUser?authUser.id:null,name,phone,email,role,roles:selected,active_role:role,verified:false};if(authUser){let res=await hcSupabase.from('profiles').upsert(profile,{onConflict:'email'}).select().single();if(res.error){console.warn('Profile save error',res.error);alert('Account created, but profile roles were not saved. Please run the V6 SQL migration if you have not run it yet.');}}
let u=upsertLocalUser(profile);currentUser=u;addNote(email,'Account created. Check your email if Supabase asks you to confirm before login.');save();alert('Account created. If email confirmation is enabled, please check your email before signing in.');show('services');return;}if(data.users.some(u=>u.email===email))return alert('Account already exists');let u={name,phone,email,pass,role,roles:selected,active_role:role,verified:false};data.users.push(u);currentUser=u;addNote(email,'Account created. Welcome to Habesha Connect.');save();show('services')}
async function logout(){if(authReady())await hcSupabase.auth.signOut();currentUser=null;save();show('home')}
function resetDemo(){if(confirm('Clear all saved Habesha Connect app data and reload?')){Object.keys(localStorage).filter(k=>k.startsWith('hc')).forEach(k=>localStorage.removeItem(k));location.reload();}}
function addNote(to,text){data.notifications.unshift({to,text,time:new Date().toLocaleString(),read:false})}
function pay(service,amount,desc){
 if(!requireLogin())return;
 let d=new Date();
 data.payments.unshift({user:currentUser.email,role:currentUser.role,service,amount,desc,time:d.toLocaleString(),month:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),quarter:d.getFullYear()+' Q'+(Math.floor(d.getMonth()/3)+1),year:String(d.getFullYear())});
 addNote(currentUser.email,`Payment recorded: ${money(amount)} for ${desc}`);
 save();
 alert('Prototype payment recorded successfully.');
}
function paymentVisibleForActiveRole(p){
 if(!currentUser)return false;
 if(currentUser.role==='admin')return true;
 if(p.user!==currentUser.email)return false;
 const role=currentUser.role;
 const service=String(p.service||'');
 const desc=String(p.desc||'');
 if(role==='sender'||role==='customer')return service==='Shipping' && /Shipment/i.test(desc) && !/Traveler|Payout|listing fee/i.test(desc);
 if(role==='traveler')return service==='Traveler Payout' || /Traveler trip listing fee|Traveler commission|Listing Fee Refund|Total Expected Payout|Total Payout/i.test(desc);

  let dbShips=(rows||[]).map(mapDbShipment);

  data.shipments=[...dbShips,...localOnly];
}

function recalcTripSpacesFromShipments(){
  (data.trips||[]).forEach(t=>{
    const used=(data.shipments||[])
      .filter(s=>String(s.tripId||'')===String(t.id||'') && ['Approved','Ready for Delivery','In Transit','Delivered','Completed'].includes(s.status||''))
      .reduce((sum,s)=>sum+(Number(s.weight)||0),0);
    const calculated=Math.max(0,(Number(t.totalSpace)||0)-used);
    if(!Number.isNaN(calculated)){
      if(t.availableSpace===undefined || calculated < Number(t.availableSpace)) t.availableSpace=calculated;
      if(t.availableSpace<=0) t.status='Full';
    }
  });
}

  return true;
}

async function loadSupabaseRentalRequests(){
  if(!authReady())return;
  let rows=[], error=null;
  let res=await hcSupabase.from('rental_requests').select('*, property:property_id(*, owner:owner_id(name,email,phone,verified)), seeker:seeker_id(name,email,phone,verified)').order('created_at',{ascending:false});
  rows=res.data||[]; error=res.error;
  if(error){
    console.warn('Rental request relationship load error, retrying basic select', error);
    let retry=await hcSupabase.from('rental_requests').select('*').order('created_at',{ascending:false});
    rows=retry.data||[]; error=retry.error;
  }
  if(error){console.warn('Rental request load error', error);return;}
  let dbRequests=(rows||[]).map(mapDbRentalRequest);
  // Important: when Supabase is connected, use Supabase as the source of truth.
  // Old local-only rental requests can make iPhone Safari show "Pending" even when
  // nothing was saved for Admin/Owner to review. Do not merge stale local requests.
  data.rentalRequests=dbRequests;
}


function friendlyRentalId(r,i){
  let raw=String((r&&r.id)||'');
  if(raw.startsWith('R')&&raw.length<=8)return raw;
  let n=(typeof i==='number'?i+1:Math.abs(raw.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%9999);
  return 'HC-R'+String(n).padStart(4,'0');
}
function rentalStatusBadge(status){

  let icon=st==='Rented'?'🔵 ':st==='Approved'||st==='Available'?'🟢 ':st==='Closed'?'🔴 ':'🟠 ';
  return `<span class="pill ${cls}">${icon}${st}</span>`;
}
function rentalStatsFor(list,reqs){

}

async function addRental(){

    let res=await hcSupabase.from('properties').insert(payload).select('*').single();
    if(res.error){
      alert('Payment was recorded, but property could not be saved to Supabase: '+res.error.message+'\nPlease send this screenshot/message so we can fix the property columns.');

    localRental.dbId=res.data.id; localRental.id=res.data.id; localRental.source='supabase';

async function payPublishRental(id){

}

 if(existing){alert('You already paid and sent a viewing request for this property.');await rentals();return;}

 let payload={property_id:propertyKey,seeker_id:currentUser.id,paid:true,status:'Pending'};

 }
 // Record the viewing fee only after the Supabase request is saved successfully.
 pay('Rentals',fee,'Viewing request '+friendlyRentalId(r,0));
 let localReq={id:res.data.id,dbId:res.data.id,rentalId:propertyKey,propertyTitle:r.title,seekerName:currentUser.name,seekerPhone:currentUser.phone||'',seekerEmail:currentUser.email,seekerId:currentUser.id||'',ownerName:r.owner,ownerPhone:r.ownerPhone||'',ownerEmail:r.ownerEmail||'',ownerId:r.ownerId||'',status:'Pending',paymentStatus:'Paid',paid:true,amountPaid:fee,time:new Date().toLocaleString(),source:'supabase'};

async function approveUser(email){
  let u=data.users.find(x=>x.email===email);
  if(!u)return alert('User not found.');
  let old=!!u.verified; u.verified=true;
  let res={error:null};
  if(authReady())res=await hcSupabase.from('profiles').update({verified:true}).eq('email',email);
  if(res.error){u.verified=old;return alert('Could not verify user in Supabase: '+res.error.message)}
  data.trips.forEach(t=>{if(t.travelerEmail===email)t.travelerVerified=true});
  data.shipments.forEach(s=>{if(s.senderEmail===email)s.senderVerified=true;if(s.travelerEmail===email)s.travelerVerified=true});
  addNote(u.email,'Your Habesha Connect account was verified by admin.');
  persistOnly();
  await refreshAdminData();
  adminSuccess();
}
async function unverifyUser(email){
  let u=data.users.find(x=>x.email===email);
  if(!u)return alert('User not found.');
  if(!confirm('Remove verified status from '+u.name+'?'))return;
  let old=!!u.verified; u.verified=false;
  let res={error:null};
  if(authReady())res=await hcSupabase.from('profiles').update({verified:false}).eq('email',email);
  if(res.error){u.verified=old;return alert('Could not unverify user in Supabase: '+res.error.message)}
  data.trips.forEach(t=>{if(t.travelerEmail===email)t.travelerVerified=false});
  data.shipments.forEach(s=>{if(s.senderEmail===email)s.senderVerified=false;if(s.travelerEmail===email)s.travelerVerified=false});
  addNote(u.email,'Your Habesha Connect verification status was changed by admin.');
  persistOnly();
  await refreshAdminData();
  adminSuccess();
}
async function editUser(email){
  let u=data.users.find(x=>x.email===email);
  if(!u)return alert('User not found.');
  let name=prompt('Edit full name:',u.name); if(name===null)return;
  let phone=prompt('Edit phone number:',u.phone||''); if(phone===null)return;
  let role=prompt('Edit active role (sender, traveler, owner, rent_seeker, customer, driver, business_owner, admin):',u.role||u.active_role||'customer'); if(role===null)return;
  name=name.trim()||u.name; phone=phone.trim(); role=role.trim()||u.role||'customer';
  let old={name:u.name,phone:u.phone,role:u.role,active_role:u.active_role,roles:[...(u.roles||[])]};
  u.name=name;u.phone=phone;u.role=role;u.active_role=role;if(!Array.isArray(u.roles))u.roles=[];if(!u.roles.includes(role))u.roles.push(role);
  let res={error:null};
  if(authReady())res=await hcSupabase.from('profiles').update({name,phone,role,active_role:role,roles:u.roles}).eq('email',email);
  if(res.error){Object.assign(u,old);return alert('Could not edit user in Supabase: '+res.error.message)}
  persistOnly(); await refreshAdminData(); adminSuccess();
}
async function deleteUser(email){
  let u=data.users.find(x=>x.email===email);
  if(!u)return alert('User not found.');
  if((u.roles||[]).includes('admin')||u.role==='admin')return alert('Admin account cannot be deleted here.');
  if(!confirm('Delete profile for '+u.name+'? This removes the profile row, not the Supabase Auth login.'))return;
  let backup=[...data.users];
  data.users=data.users.filter(x=>x.email!==email);
  let res={error:null};
  if(authReady())res=await hcSupabase.from('profiles').delete().eq('email',email);
  if(res.error){data.users=backup;return alert('Could not delete profile in Supabase: '+res.error.message)}
  persistOnly(); await refreshAdminData(); adminSuccess();
}
async function approveShipment(id){
  let s=data.shipments.find(x=>String(x.id)===String(id)||String(x.dbId)===String(id));
  if(!s)return alert('Shipment not found.');
  let old={status:s.status,paid:s.paid,paymentStatus:s.paymentStatus,spaceDeducted:s.spaceDeducted};
  let t=s.tripId?data.trips.find(x=>String(x.id)===String(s.tripId)):null;
  let oldTrip=t?{availableSpace:t.availableSpace,status:t.status}:null;
  if(t&&!s.spaceDeducted){if(s.weight>t.availableSpace)return alert('Not enough space left. Remaining: '+t.availableSpace+' lb');t.availableSpace=Math.max(0,Number(t.availableSpace||0)-Number(s.weight||0));t.status=t.availableSpace===0?'Full':'Open';s.spaceDeducted=true;}
  s.status='Approved';s.paid=true;s.paymentStatus='Paid';
  let res={error:null};
  if(authReady()&&s.dbId){res=await hcSupabase.from('shipments').update({status:'Approved',paid:true}).eq('id',s.dbId);}
  if(!res.error&&authReady()&&t&&t.dbId){res=await hcSupabase.from('trips').update({remaining_space_lb:t.availableSpace,status:t.status}).eq('id',t.dbId);}
  if(res.error){Object.assign(s,old);if(t&&oldTrip)Object.assign(t,oldTrip);return alert('Could not approve shipment in Supabase: '+res.error.message)}
  addNote(s.senderEmail||'all','Your shipment '+(s.tracking||id)+' was approved by admin. Traveler contact is now available.');
  if(s.travelerEmail)addNote(s.travelerEmail,'Shipment '+(s.tracking||id)+' was approved by admin. Sender and receiver contact are now available.');
  persistOnly(); await refreshAdminData(); adminSuccess();
}
async function markDelivered(id){
  let s=data.shipments.find(x=>String(x.id)===String(id)||String(x.dbId)===String(id));
  if(!s)return alert('Shipment not found.');
  if(!confirm('Mark shipment '+(s.tracking||id)+' as delivered/completed? It will only show in Admin after this.'))return;
  let old=s.status;s.status='Delivered';
  let res={error:null};
  if(authReady()&&s.dbId)res=await hcSupabase.from('shipments').update({status:'Delivered'}).eq('id',s.dbId);
  if(res.error){s.status=old;return alert('Could not mark delivered in Supabase: '+res.error.message)}
  addNote('admin@habeshaconnect.com','Shipment '+(s.tracking||id)+' was marked delivered.');
  persistOnly(); await refreshAdminData(); adminSuccess();
}

async function payTraveler(id){
  let s=data.shipments.find(x=>String(x.id)===String(id)||String(x.dbId)===String(id));
  if(!s)return alert('Shipment not found.');
  if(!['Delivered','Completed'].includes(s.status||'')){
    if(!confirm('Traveler payout is recommended only after delivery is completed. Continue anyway?'))return;
  }
  if(s.travelerPaid){alert('Traveler payout is already marked paid.');return;}
  let baseAmount=Number(s.weight||0)*settings().travelerCommissionPerLb;
  let trip=s.tripId?data.trips.find(t=>String(t.id)===String(s.tripId)):null;
  let listingRefund=(trip&&trip.listingFeePaid&&!trip.listingFeeRefunded)?Number(trip.listingFeeAmount||settings().travelerTripListingFee||10):0;
  let amount=baseAmount+listingRefund;
  let method=prompt('Payout method (Zelle, PayPal, Cash App, Bank Transfer, Cash):','Zelle'); if(method===null)return;
  let note=prompt('Payout note or confirmation number:','Manual payout completed'); if(note===null)return;
  s.travelerPaid=true;
  s.travelerPaidAt=new Date().toLocaleString();
  s.travelerPayoutMethod=method||'Manual';
  s.travelerPayoutNote=note||'';
  data.payments.unshift({user:s.travelerEmail||'traveler',service:'Traveler Payout',amount:amount,desc:'Traveler commission payout for shipment '+(s.tracking||s.id)+(listingRefund?' including '+money(listingRefund)+' trip listing fee refund':'')+' via '+s.travelerPayoutMethod,time:s.travelerPaidAt,month:new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'),quarter:new Date().getFullYear()+' Q'+(Math.floor(new Date().getMonth()/3)+1),year:String(new Date().getFullYear())});
  let res={error:null};
  if(authReady()&&s.dbId){
    res=await hcSupabase.from('shipments').update({traveler_paid:true,traveler_paid_at:new Date().toISOString(),traveler_payout_method:s.travelerPayoutMethod,traveler_payout_note:s.travelerPayoutNote,listing_fee_refund:listingRefund}).eq('id',s.dbId);
    if(res.error&&String(res.error.message||'').toLowerCase().includes('column')){

function setupAdminOneClickProtection(){
  document.addEventListener('click', function(e){
    const btn=e.target.closest('#admin button, #services button');
    if(!btn) return;
    if(btn.dataset.busy==='1'){
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }
    const isActionButton = /Verify|Unverify|Approve|Delete|Edit|Toggle|Save My Services/.test((btn.textContent||''));
    if(!isActionButton) return;
    btn.dataset.busy='1';
    btn.dataset.oldText=btn.textContent;
    setTimeout(()=>{
      btn.disabled=true;
      btn.textContent='Working...';
      btn.style.opacity='0.65';
      btn.style.cursor='wait';
    },0);
    // Re-enable fallback in case a prompt is cancelled or Supabase is slow.
    setTimeout(()=>{
      if(document.body.contains(btn)){
        btn.disabled=false;
        btn.textContent=btn.dataset.oldText||btn.textContent;
        btn.dataset.busy='0';
        btn.style.opacity='';
        btn.style.cursor='';
      }
    },6500);
  }, true);
}
setupAdminOneClickProtection();

function tText(s){if(currentLang()==='en')return s;let d=HC_I18N.am||{};let exact=d[s];if(exact)return exact;let out=s;Object.keys(d).sort((a,b)=>b.length-a.length).forEach(k=>{if(out.includes(k))out=out.split(k).join(d[k]);});return out;}
function translateNodeTree(root){if(!root||currentLang()==='en')return;let skip=['SCRIPT','STYLE','INPUT','TEXTAREA','OPTION','SELECT'];let walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(node){let p=node.parentElement;if(!p||skip.includes(p.tagName))return NodeFilter.FILTER_REJECT;let v=node.nodeValue;if(!v||!v.trim())return NodeFilter.FILTER_REJECT;return NodeFilter.FILTER_ACCEPT;}});let nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(n=>{n.nodeValue=tText(n.nodeValue);});document.querySelectorAll('input[placeholder],textarea[placeholder]').forEach(el=>{el.placeholder=tText(el.placeholder);});document.querySelectorAll('button,th,td,label,p,h1,h2,h3,span,option').forEach(el=>{if(el.childNodes.length===1&&el.childNodes[0].nodeType===3)el.textContent=tText(el.textContent);});}
